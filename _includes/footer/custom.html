<!-- Support for MatJax -->
<script defer src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script"></script>

<!-- Support for Mermaid -->
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({startOnLoad:true, theme:'default'});
    await mermaid.run({querySelector:'code.language-mermaid'});
</script>

<script>
  async function copyToClipboard(text) {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return;
    }

    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.setAttribute('readonly', '');
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();

    try {
      if (!document.execCommand('copy')) throw new Error('Copy failed');
    } finally {
      textarea.remove();
    }
  }

  document.addEventListener('click', async function (event) {
    const copyTarget = event.target.closest('.citation-copy, .email-copy');
    if (!copyTarget) return;

    const isEmail = copyTarget.classList.contains('email-copy');
    const text = isEmail ? copyTarget.dataset.email : copyTarget.dataset.citation;
    const statusSelector = isEmail ? '.email-copy__status' : '.citation-copy__status';
    const status = copyTarget.parentElement.querySelector(statusSelector);

    if (isEmail) event.preventDefault();

    try {
      await copyToClipboard(text);
      status.textContent = isEmail ? 'Email copied!' : 'BibTeX copied!';
      window.setTimeout(function () { status.textContent = ''; }, 2500);
    } catch (error) {
      if (isEmail) {
        status.textContent = 'Opening email app...';
        window.location.href = copyTarget.href;
      } else {
        status.textContent = 'Unable to copy BibTeX.';
      }
    }
  });
</script>
