<!-- Support for MatJax -->
<script defer src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script"></script>

<!-- Support for Mermaid -->
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({startOnLoad:true, theme:'default'});
    await mermaid.run({querySelector:'code.language-mermaid'});
</script>

<script>
  document.addEventListener('click', async function (event) {
    const button = event.target.closest('.citation-copy');
    if (!button) return;

    const citation = button.dataset.citation;
    const status = button.parentElement.querySelector('.citation-copy__status');

    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(citation);
      } else {
        const textarea = document.createElement('textarea');
        textarea.value = citation;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        if (!document.execCommand('copy')) throw new Error('Copy failed');
        textarea.remove();
      }

      status.textContent = 'BibTeX copied!';
      window.setTimeout(function () { status.textContent = ''; }, 2500);
    } catch (error) {
      status.textContent = 'Unable to copy citation.';
    }
  });
</script>

<!-- end custom footer snippets -->
